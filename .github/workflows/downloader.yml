name: TikTok Link & Metadata Extractor

on:
  workflow_dispatch:
    inputs:
      url_tiktok:
        description: 'URL Video TikTok'
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install --upgrade yt-dlp

      - name: Ambil Metadata & Link
        run: |
          echo "� Metadata Video:"
          echo "=================="
          yt-dlp --print "Judul: %(title)s" \
                 --print "Author: %(uploader)s" \
                 --print "Durasi: %(duration)s detik" \
                 --print "Tanggal: %(upload_date)s" \
                 --print "Views: %(view_count)s" \
                 --print "Likes: %(like_count)s" \
                 "${{ github.event.inputs.url_tiktok }}"
          
          echo ""
          echo "🔗 Semua Format:"
          echo "================"
          yt-dlp --list-formats "${{ github.event.inputs.url_tiktok }}"
          
          echo ""
          echo "⬇️ Link Download Terbaik (MP4):"
          echo "=============================="
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -g "${{ github.event.inputs.url_tiktok }}"

