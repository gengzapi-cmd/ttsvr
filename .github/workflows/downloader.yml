name: TikTok Downloader (4 Types)

on:
  workflow_dispatch:
    inputs:
      url_tiktok:
        description: "URL Video TikTok"
        required: true
        type: string

jobs:
  extract-links:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: |
          wget -qO yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
          chmod a+rx yt-dlp

      - name: Extract All Data
        run: |
          echo "=== METADATA & NO WATERMARK ==="
          ./yt-dlp --print "%(title)s|%(uploader)s|%(thumbnail)s|%(url)s" --no-playlist "${{ github.event.inputs.url_tiktok }}" 2>/dev/null || echo "Unknown|Unknown|Unknown|"

          echo "=== [1] DOWNLOAD DENGAN WATERMARK ==="
          ./yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -g "${{ github.event.inputs.url_tiktok }}" 2>/dev/null || echo "Tidak ditemukan"

          echo ""
          echo "=== [3] SUARA ASLI (MUSIK TIKTOK) ==="
          ./yt-dlp --print "%(music_info.play_url)s" "${{ github.event.inputs.url_tiktok }}" 2>/dev/null || echo "Tidak ada musik asli"

          echo ""
          echo "=== [4] SUARA KONTEN (AUDIO VIDEO) ==="
          ./yt-dlp -f ba -g "${{ github.event.inputs.url_tiktok }}" 2>/dev/null || echo "Tidak ditemukan"
